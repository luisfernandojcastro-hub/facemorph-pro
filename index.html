<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceMorph PRO — Studio</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080f; --s1: #0f0f18; --s2: #161622; --s3: #1e1e2e; --s4: #2a2a3e;
  --b1: rgba(255,255,255,.05); --b2: rgba(255,255,255,.09); --b3: rgba(255,255,255,.14);
  --tx: #f0f0fa; --tx2: #9090b0; --tx3: #60607a; --tx4: #404058;
  --in: #5a5cf5; --in2: #818cf8; --inglow: rgba(90,92,245,.3);
  --live: #22c55e; --proc: #3b82f6; --idle: #404058; --warn: #f59e0b; --err: #ef4444;
  --nav-h: 52px; --side-w: 288px; --r: 9px; --t: .18s;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body { background: var(--bg); color: var(--tx); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
.nav { position: fixed; top:0; left:0; right:0; z-index:100; height: var(--nav-h); background: rgba(8,8,15,.88); backdrop-filter: blur(14px) saturate(1.5); border-bottom: 1px solid var(--b1); display: flex; align-items: center; padding: 0 1.1rem; }
.nav-logo { display:flex; align-items:center; gap:.5rem; text-decoration:none; color: var(--tx); }
.nav-logo-icon { width:24px; height:24px; border-radius:6px; background: var(--in); display:grid; place-items:center; font-family:'JetBrains Mono',monospace; font-size:.72rem; font-weight:700; }
.nav-pills { display:flex; gap:1px; background:var(--s2); border:1px solid var(--b2); border-radius:8px; padding:2px; margin-left:1rem; }
.nav-pill { padding:.3rem .8rem; border-radius:6px; font-size:.75rem; color:var(--tx3); transition: var(--t); }
.nav-pill.active { background:var(--s4); color:var(--tx); }
.shell { display:flex; height:100vh; padding-top:var(--nav-h); }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
.content { flex:1; overflow-y:auto; padding:1rem; }
.cv-shell { flex:1; min-height:0; position:relative; border-radius:11px; overflow:hidden; background:#000; border:1px solid var(--b1); }
.cv-shell canvas { width:100%; height:100%; object-fit:cover; display:block; }
.cv-dock { position:absolute; bottom:1rem; left:50%; transform:translateX(-50%); z-index:10; display:flex; align-items:center; gap:2px; padding:5px; background:rgba(8,8,15,.8); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.1); border-radius:14px; }
.dk-btn { width:38px; height:38px; display:grid; place-items:center; border-radius:9px; color:rgba(255,255,255,.5); transition: var(--t); }
.dk-btn:hover { background:rgba(255,255,255,.1); color:#fff; transform:scale(1.1); }
.dk-btn svg { width:18px; height:18px; stroke:currentColor; stroke-width:1.5; fill:none; }
.sidebar { width:var(--side-w); background:var(--s1); border-left:1px solid var(--b1); display:flex; flex-direction:column; }
.stab-btn { flex:1; padding:.7rem; font-size:.7rem; color:var(--tx3); border-bottom:2px solid transparent; transition: var(--t); }
.stab-btn.active { color:var(--tx); border-bottom-color:var(--in); }
.pane { padding:1rem; display:none; flex-direction:column; gap:1rem; }
.pane.active { display:flex; }
.upzone { border:1px dashed var(--b3); border-radius:var(--r); padding:1.5rem; text-align:center; cursor:pointer; background:rgba(255,255,255,.015); }
.tools-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:1rem; }
.tc { background:var(--s1); border:1px solid var(--b1); border-radius:11px; overflow:hidden; transition: var(--t); cursor:pointer; }
.tc-thumb { height:90px; display:flex; align-items:center; justify-content:center; }
.g1 { background: linear-gradient(135deg, #1e1b4b, #4338ca); }
.g2 { background: linear-gradient(135deg, #064e3b, #059669); }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo"><div class="nav-logo-icon">F</div><div class="nav-logo-name">FaceMorph</div></div>
  <div class="nav-pills">
    <button class="nav-pill active" onclick="App.nav('hub',this)">Hub</button>
    <button class="nav-pill" onclick="App.nav('swap',this)">Face Swap</button>
    <button class="nav-pill" onclick="App.nav('motion',this)">Motion</button>
  </div>
</nav>
<div class="shell">
  <div class="main">
    <div class="content">
      <div class="page active" id="page-hub">
        <h1 style="margin-bottom:1.5rem">AI Studio PRO</h1>
        <div class="tools-grid">
          <div class="tc" onclick="App.nav('swap')"><div class="tc-thumb g1"><span style="font-family:'JetBrains Mono';letter-spacing:.2em">FACE SWAP</span></div></div>
          <div class="tc" onclick="App.nav('motion')"><div class="tc-thumb g2"><span style="font-family:'JetBrains Mono';letter-spacing:.2em">MOTION</span></div></div>
        </div>
      </div>
      <div class="page" id="page-studio">
        <div class="cv-shell"><canvas id="main-canvas"></canvas><div class="cv-dock">
          <button class="dk-btn" onclick="App.capture()"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
          <button class="dk-btn" onclick="App.toggleRun()"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21" style="fill:currentColor"/></svg></button>
        </div></div>
      </div>
    </div>
  </div>
  <aside class="sidebar" id="sidebar" style="display:none">
    <div style="display:flex;"><button class="stab-btn active" onclick="App.tab(0)">Ajustes</button><button class="stab-btn" onclick="App.tab(1)">Fonte</button></div>
    <div class="pane active" id="pane-0"><span style="font-size:.6rem;font-weight:600;color:var(--tx4)">OPACIDADE</span><input type="range" style="width:100%" id="sl-op" value="90"></div>
    <div class="pane" id="pane-1">
      <div class="upzone" onclick="document.getElementById('video-upload').click()">Subir Vídeo (.mp4)<input type="file" id="video-upload" accept="video/*" style="display:none" onchange="App.handleVideo(this)"></div>
      <div class="upzone" style="margin-top:1rem" onclick="document.getElementById('face-upload').click()">Rosto Alvo (Foto)<input type="file" id="face-upload" accept="image/*" style="display:none" onchange="App.handleFace(this)"></div>
    </div>
  </aside>
</div>
<video id="hidden-video" style="display:none" loop muted playsinline></video>
<script>
const App = {
  running: false, source: 'cam',
  nav(p, b) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById(p==='hub'?'page-hub':'page-studio').classList.add('active');
    document.getElementById('sidebar').style.display = p==='hub'?'none':'flex';
    if(b) { document.querySelectorAll('.nav-pill').forEach(btn=>btn.classList.remove('active')); b.classList.add('active'); }
  },
  tab(i) {
    document.querySelectorAll('.pane').forEach((p,idx)=>p.classList.toggle('active',i===idx));
    document.querySelectorAll('.stab-btn').forEach((b,idx)=>b.classList.toggle('active',i===idx));
  },
  async handleVideo(input) {
    const file = input.files[0]; if(!file) return;
    document.getElementById('hidden-video').src = URL.createObjectURL(file);
    this.source = 'video'; document.getElementById('hidden-video').play(); this.startEngine();
  },
  async toggleRun() { this.running ? this.running=false : this.startEngine(); },
  async startEngine() {
    this.running = true; const canvas = document.getElementById('main-canvas');
    const source = this.source === 'cam' ? await navigator.mediaDevices.getUserMedia({video:true}).then(s=>{const v=document.createElement('video');v.srcObject=s;v.play();return v;}) : document.getElementById('hidden-video');
    const faceMesh = new FaceMesh({locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true});
    faceMesh.onResults(res => {
      const ctx = canvas.getContext('2d'); canvas.width=res.image.width; canvas.height=res.image.height;
      ctx.drawImage(res.image,0,0);
    });
    const loop = async () => { if(!this.running) return; await faceMesh.send({image:source}); requestAnimationFrame(loop); };
    loop();
  },
  capture() { const a=document.createElement('a'); a.href=document.getElementById('main-canvas').toDataURL(); a.download='capture.png'; a.click(); }
};
</script>
</body>
</html>
